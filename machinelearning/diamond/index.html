<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ring Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #22d3ee;
            --accent-2: #a78bfa;
            --ok: #22c55e;
            --err: #f43f5e;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top right, #1f2937 0%, var(--bg) 55%);
        }

        .wrap {
            max-width: 980px;
            margin: 36px auto;
            padding: 0 16px;
        }

        .hero {
            text-align: center;
            margin-bottom: 18px;
        }

        .hero h1 {
            margin-bottom: 8px;
            font-size: 2rem;
            font-weight: 700;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
        }

        .card-shell {
            background: linear-gradient(145deg, #111827, #0b1220);
            border: 1px solid #334155;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        .section-title {
            color: #cbd5e1;
            font-size: 0.92rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin: 8px 0 14px;
        }

        .form-label {
            font-weight: 600;
            color: #dbeafe;
            margin-bottom: 6px;
        }

        .form-control, .form-select {
            background-color: #0f172a;
            color: var(--text);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 10px 12px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(34, 211, 238, 0.2);
            background-color: #0b1324;
            color: #f8fafc;
        }

        .btn-predict {
            width: 100%;
            margin-top: 10px;
            border: 0;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            color: #0f172a;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .btn-predict:disabled {
            opacity: 0.7;
        }

        .status-box {
            display: none;
            margin-top: 18px;
            border-radius: 12px;
            padding: 14px 16px;
            font-weight: 600;
        }

        .status-ok {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #bbf7d0;
        }

        .status-err {
            display: block;
            background: rgba(244, 63, 94, 0.12);
            border: 1px solid rgba(244, 63, 94, 0.5);
            color: #fecdd3;
        }

        .hint {
            color: var(--muted);
            font-size: 0.86rem;
            margin-top: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="hero">
            <h1><i class="fa-regular fa-gem"></i> Ring Price Predictor</h1>
            <p>Predict ring/diamond price using your Kaggle-trained model.</p>
        </section>

        <section class="card-shell">
            <form id="predictionForm">
                <div class="section-title">Categorical Features (String)</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="cut" class="form-label">Cut</label>
                        <select class="form-select" id="cut" required>
                            <option value="Fair">Fair</option>
                            <option value="Good">Good</option>
                            <option value="Very Good">Very Good</option>
                            <option value="Premium">Premium</option>
                            <option value="Ideal">Ideal</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="color" class="form-label">Color</label>
                        <select class="form-select" id="color" required>
                            <option value="D">D</option>
                            <option value="E">E</option>
                            <option value="F">F</option>
                            <option value="G">G</option>
                            <option value="H">H</option>
                            <option value="I">I</option>
                            <option value="J">J</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label for="clarity" class="form-label">Clarity</label>
                        <select class="form-select" id="clarity" required>
                            <option value="I1">I1</option>
                            <option value="SI2">SI2</option>
                            <option value="SI1">SI1</option>
                            <option value="VS2">VS2</option>
                            <option value="VS1">VS1</option>
                            <option value="VVS2">VVS2</option>
                            <option value="VVS1">VVS1</option>
                            <option value="IF">IF</option>
                        </select>
                    </div>
                </div>

                <div class="section-title mt-4">Numeric Features (Float)</div>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label for="carat" class="form-label">Carat</label>
                        <input id="carat" class="form-control" type="number" step="0.01" min="0" placeholder="e.g. 1.25" required>
                    </div>
                    <div class="col-md-4">
                        <label for="depth" class="form-label">Depth (%)</label>
                        <input id="depth" class="form-control" type="number" step="0.01" min="0" placeholder="e.g. 61.5" required>
                    </div>
                    <div class="col-md-4">
                        <label for="table" class="form-label">Table (%)</label>
                        <input id="table" class="form-control" type="number" step="0.01" min="0" placeholder="e.g. 57.0" required>
                    </div>
                    <div class="col-md-4">
                        <label for="x" class="form-label">Length x (mm)</label>
                        <input id="x" class="form-control" type="number" step="0.01" min="0" placeholder="e.g. 5.73" required>
                    </div>
                    <div class="col-md-4">
                        <label for="y" class="form-label">Width y (mm)</label>
                        <input id="y" class="form-control" type="number" step="0.01" min="0" placeholder="e.g. 5.76" required>
                    </div>
                    <div class="col-md-4">
                        <label for="z" class="form-label">Height z (mm)</label>
                        <input id="z" class="form-control" type="number" step="0.01" min="0" placeholder="e.g. 3.53" required>
                    </div>
                </div>

                <button id="predictButton" type="submit" class="btn-predict">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> Predict Ring Price
                </button>
            </form>

            <div id="resultBox" class="status-box"></div>
            <p class="hint">Tip: Keep category values the same as the training dataset labels.</p>
        </section>
    </main>

    <script>
        const form = document.getElementById("predictionForm");
        const resultBox = document.getElementById("resultBox");
        const predictButton = document.getElementById("predictButton");

        function showResult(message, ok) {
            resultBox.className = "status-box " + (ok ? "status-ok" : "status-err");
            resultBox.textContent = message;
        }

        form.addEventListener("submit", async function (event) {
            event.preventDefault();
            predictButton.disabled = true;
            predictButton.textContent = "Predicting...";
            resultBox.style.display = "none";

            const payload = {
                carat: parseFloat(document.getElementById("carat").value),
                cut: document.getElementById("cut").value,
                color: document.getElementById("color").value,
                clarity: document.getElementById("clarity").value,
                depth: parseFloat(document.getElementById("depth").value),
                table: parseFloat(document.getElementById("table").value),
                x: parseFloat(document.getElementById("x").value),
                y: parseFloat(document.getElementById("y").value),
                z: parseFloat(document.getElementById("z").value)
            };

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Prediction failed.");
                }

                const formattedPrice = new Intl.NumberFormat("en-US", {
                    style: "currency",
                    currency: "USD",
                    maximumFractionDigits: 0
                }).format(data.predicted_price);

                showResult("Predicted ring price: " + formattedPrice, true);
            } catch (error) {
                showResult(error.message || "An unexpected error occurred.", false);
            } finally {
                predictButton.disabled = false;
                predictButton.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Predict Ring Price';
            }
        });
    </script>
</body>
</html>
